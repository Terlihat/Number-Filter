<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Filter Tool - Dark Mode</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Number Filter Tool</h1>
        <p class="version-tag">Version 1.4.0 | Desktop Optimized & Duplicate Detector</p>
    </header>

    <main class="container">
        <div class="col">
            <div class="col-header">
                <label>Input 1 (Data Utama):</label>
                <div class="header-actions">
                    <button class="btn-small btn-upload" onclick="triggerUpload('fileInput1')">Upload</button>
                    <button class="btn-small btn-clear" id="clearInput1">Clear</button>
                </div>
            </div>
            <input type="file" id="fileInput1" accept=".txt" style="display:none">
            <div id="input1" class="custom-textarea" contenteditable="true" placeholder="Masukkan angka di sini atau drop file .txt..."></div>
        </div>

        <div class="col">
            <div class="col-header">
                <label for="input2">Input 2 (Data Pengecualian):</label>
                <div class="header-actions">
                    <button class="btn-small btn-upload" onclick="triggerUpload('fileInput2')">Upload</button>
                    <button class="btn-small btn-clear" id="clearInput2">Clear</button>
                </div>
            </div>
            <input type="file" id="fileInput2" accept=".txt" style="display:none">
            <textarea id="input2" placeholder="Masukkan angka yang ingin dieliminasi atau drop file .txt..."></textarea>
            
            <button id="processBtn">Proses Pencocokan</button>
        </div>

        <div class="col">
            <div class="col-header">
                <label for="output">Output 3 (Sisa Baris Data Utama):</label>
                <div class="header-actions">
                    <button class="btn-small btn-clear" id="clearOutput">Clear</button>
                </div>
            </div>
            <textarea id="output" readonly placeholder="Hasil filter akan muncul di sini..."></textarea>
            
            <div id="stats" class="stats"><strong>Menunggu proses...</strong></div>
            
            <div class="action-buttons">
                <button id="copyBtn" class="btn-action">Salin Teks</button>
                <button id="downloadBtn" class="btn-action">Unduh (.txt)</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
