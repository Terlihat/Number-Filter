<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Filter Tool</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Number Filter Tool</h1>
        <p class="version-tag">Version 1.2.0 | Desktop Optimized</p>
    </header>

    <main class="container">
        <div class="col">
            <label for="input1">Input 1 (Data Utama):</label>
            <div id="input1" class="custom-textarea" contenteditable="true" placeholder="Masukkan 16 digit angka di sini... (Tekan Enter untuk baris baru)"></div>
        </div>

        <div class="col">
            <label for="input2">Input 2 (Data Pengecualian):</label>
            <textarea id="input2" placeholder="Masukkan angka yang ingin dihapus dari Data Utama..."></textarea>
            
            <button id="processBtn">Proses Pencocokan</button>
        </div>

        <div class="col">
            <label for="output">Output 3 (Sisa Baris Data Utama):</label>
            <textarea id="output" readonly placeholder="Hasil akan muncul di sini..."></textarea>
            
            <div id="stats" class="stats"></div>
            
            <div class="action-buttons">
                <button id="copyBtn" class="btn-action">Salin Teks</button>
                <button id="downloadBtn" class="btn-action">Unduh (.txt)</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
